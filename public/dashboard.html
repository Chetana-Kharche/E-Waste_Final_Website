<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EcoSync</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.8);
            border-right: 1px solid var(--border);
            height: calc(100vh - 70px);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: fixed;
            left: 0;
            top: 70px;
        }
        .nav-item {
            padding: 1rem;
            border-radius: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            width: calc(100% - 250px);
            min-height: calc(100vh - 70px);
        }
        nav { height: 70px; position: fixed; top: 0; width: 100%; z-index: 50; }
        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body style="padding-top: 70px;">
    <nav>
        <a href="#" class="logo"><i class="ri-recycle-fill"></i> Eco<span>Sync</span></a>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div id="notification-bell" style="position: relative; cursor: pointer; font-size: 1.2rem; color: var(--text-main);">
                <i class="ri-notification-3-line"></i>
                <span id="notif-badge" style="position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 50%; display: none;">0</span>
            </div>
            <span id="user-name-display" style="color: var(--text-muted);">User</span>
            <button id="logout-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="sidebar">
        <div class="nav-item active" data-target="tab-dashboard"><i class="ri-dashboard-line"></i> Dashboard</div>
        <div class="nav-item" data-target="tab-pickup"><i class="ri-truck-line"></i> Request Pickup</div>
        <div class="nav-item" data-target="tab-history"><i class="ri-history-line"></i> History</div>
        <div class="nav-item" data-target="tab-profile"><i class="ri-user-settings-line"></i> Profile</div>
        <div class="nav-item" data-target="tab-notifications"><i class="ri-notification-badge-line"></i> Notifications</div>
    </div>

    <div class="main-content">
        <!-- Dashboard Tab -->
        <div id="tab-dashboard" class="tab-section active">
            <h2 class="mb-2">Your <span class="text-gradient">Impact Dashboard</span></h2>
            <div class="grid-3 mb-2">
                <div class="stat-card">
                    <i class="ri-weight-line text-gradient" style="font-size: 2rem;"></i>
                    <div class="stat-value" id="stat-kg">0</div>
                    <div class="stat-label">Kg Recycled</div>
                </div>
                <div class="stat-card">
                    <i class="ri-medal-fill text-gradient" style="font-size: 2rem; color: #fbbf24;"></i>
                    <div class="stat-value" id="stat-rewards">0</div>
                    <div class="stat-label">Reward Points</div>
                </div>
                <div class="stat-card">
                    <i class="ri-leaf-fill text-gradient" style="font-size: 2rem;"></i>
                    <div class="stat-value" id="stat-co2">0</div>
                    <div class="stat-label">Kg CO2 Saved</div>
                </div>
            </div>
            <div class="glass-card mb-2" style="max-height: 250px; overflow-y: auto;">
                <h3>Nearby Recycling Centers</h3>
                <div id="centers-list" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- Request Pickup Tab -->
        <div id="tab-pickup" class="tab-section">
            <h2 class="mb-2">Schedule <span class="text-gradient">Pickup</span></h2>
            <div class="glass-card" style="max-width: 600px;">
                <form id="submission-form">
                    <div class="form-group">
                        <label>Waste Category</label>
                        <select id="waste-type" required>
                            <option value="">Select Category...</option>
                            <option value="Laptop/PC">Laptop / PC</option>
                            <option value="Mobile Phone">Mobile Phone</option>
                            <option value="Peripherals">Keyboards / Mice / Cables</option>
                            <option value="Battery">Batteries</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estimated Weight (Kg)</label>
                        <input type="number" step="0.1" id="waste-weight" required>
                    </div>
                    <div class="form-group">
                        <label>Pickup Address</label>
                        <input type="text" id="waste-address" placeholder="123 Example St, City" required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Pickup Date/Time</label>
                        <input type="datetime-local" id="waste-time" required>
                    </div>
                    <div class="form-group">
                        <label>Upload Photo of Waste</label>
                        <input type="file" id="waste-photo" accept="image/*" required>
                        <img id="photo-preview" alt="Preview" style="margin-top: 1rem; max-width: 100%; border-radius: 8px; display: none;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Request</button>
                    <p id="submit-msg" class="mt-2 text-center"></p>
                </form>
            </div>
        </div>

        <!-- History Tab -->
        <div id="tab-history" class="tab-section">
            <h2 class="mb-2">Pickup <span class="text-gradient">History</span></h2>
            <div class="glass-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date Requested</th>
                            <th>Pickup Details</th>
                            <th>Type / Weight</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Profile Tab -->
        <div id="tab-profile" class="tab-section">
            <h2 class="mb-2">Manage <span class="text-gradient">Profile</span></h2>
            <div class="glass-card" style="max-width: 600px;">
                <form id="profile-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="prof-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email (Cannot be changed)</label>
                        <input type="email" id="prof-email" disabled style="opacity: 0.5;">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="prof-phone">
                    </div>
                    <div class="form-group">
                        <label>Default Address</label>
                        <input type="text" id="prof-address">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
                    <p id="prof-msg" class="mt-2 text-center"></p>
                </form>
            </div>
        </div>

        <!-- Notifications Tab -->
        <div id="tab-notifications" class="tab-section">
            <h2 class="mb-2">Your <span class="text-gradient">Notifications</span></h2>
            <div class="glass-card">
                <div id="notif-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'user') window.location.href = 'index.html';

        // Tab Switching Logic
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.getAttribute('data-target')).classList.add('active');
            });
        });

        // Photo Preview
        document.getElementById('waste-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('photo-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
